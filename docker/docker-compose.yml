version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin@123
      MONGO_INITDB_DATABASE: ecommerce
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis@123 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ecommerce-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ecommerce-network

  # Auth Service
  auth-service:
    build:
      context: ..
      dockerfile: docker/services/auth-service.Dockerfile
    container_name: ecommerce-auth-service
    restart: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DB_URI: mongodb://admin:admin@123@mongodb:27017/auth-db?authSource=admin
      REDIS_URL: redis://:redis@123@redis:6379
      PORT: 3001
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  # Product Service
  product-service:
    build:
      context: ..
      dockerfile: docker/services/product-service.Dockerfile
    container_name: ecommerce-product-service
    restart: always
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      DB_URI: mongodb://admin:admin@123@mongodb:27017/product-db?authSource=admin
      REDIS_URL: redis://:redis@123@redis:6379
      PORT: 3002
      KAFKA_BROKER: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecommerce-network

  # Cart Service
  cart-service:
    build:
      context: ..
      dockerfile: docker/services/cart-service.Dockerfile
    container_name: ecommerce-cart-service
    restart: always
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      DB_URI: mongodb://admin:admin@123@mongodb:27017/cart-db?authSource=admin
      REDIS_URL: redis://:redis@123@redis:6379
      PORT: 3003
      KAFKA_BROKER: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecommerce-network

  # Order Service
  order-service:
    build:
      context: ..
      dockerfile: docker/services/order-service.Dockerfile
    container_name: ecommerce-order-service
    restart: always
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      DB_URI: mongodb://admin:admin@123@mongodb:27017/order-db?authSource=admin
      REDIS_URL: redis://:redis@123@redis:6379
      PORT: 3004
      KAFKA_BROKER: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecommerce-network

  # API Gateway
  gateway:
    build:
      context: ..
      dockerfile: docker/gateway/Dockerfile
    container_name: ecommerce-gateway
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - order-service
    networks:
      - ecommerce-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - ecommerce-network

volumes:
  mongo-data:
  redis-data:

networks:
  ecommerce-network:
    driver: bridge
